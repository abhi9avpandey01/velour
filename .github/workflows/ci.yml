# ──────────────────────────────────────────────────────────────
# Velour — CI Pipeline
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format (Frontend) ───────────────────
  lint-frontend:
    name: Lint & Format (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ── Type Check ─────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── Build Web ──────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:types
      - run: pnpm build:web

  # ── Lint & Format (Backend) ────────────────────
  lint-backend:
    name: Lint & Format (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: services/api
        run: poetry install --no-interaction --no-ansi

      - name: Lint with Ruff
        working-directory: services/api
        run: poetry run ruff check .

      - name: Check formatting with Ruff
        working-directory: services/api
        run: poetry run ruff format --check .

  # ── Test (Backend) ─────────────────────────────
  test-backend:
    name: Test (Backend)
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: services/api
        run: poetry install --no-interaction --no-ansi

      - name: Run tests
        working-directory: services/api
        run: poetry run pytest -v

  # ── Docker Build ───────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build images
        run: docker compose build
